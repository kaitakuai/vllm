name: contract-tests-residual

# Drift detection for the kaitakuai sampler-stack residual fork.
#
# Two jobs run in parallel:
#
#   in-fork:
#     Installs THIS branch as the vllm wheel (editable). Asserts that all
#     6 patched surfaces (logprobs_mode, enforced_token_ids,
#     batch_logprobs_mode, need_processed_logprobs, logprobs_modes dict,
#     XgrammarGrammar._grammar_failed) are present. Failure means a patch
#     regression on this branch — fix BEFORE merging the PR.
#
#   upstream-drift (continue-on-error):
#     Installs the latest stable vllm wheel from PyPI (NOT our fork) and
#     runs the same contract tests. This job is EXPECTED to fail on the
#     patch-added fields (logprobs_mode, enforced_token_ids, etc.). Its
#     purpose is to alert us when upstream signatures change UNDER our
#     patches, so the rebase author can adapt BEFORE cherry-picking onto
#     the next minor. A green run here would actually be interesting — it
#     would suggest upstream adopted our surface.
#
# Schedule: daily 06:00 UTC sentinel run + on every push / PR. Manual
# dispatch is available too.
#
# See REBASE.md for the rebase procedure and ADR-0014 in
# mlnode-foundry/docs/adr/ for the architecture rationale.

on:
  push:
    branches:
      - 'poc-sampler-residual-v0.23'
    paths-ignore:
      - '**/*.md'
      - '**/REBASE.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/REBASE.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
  schedule:
    # Daily 06:00 UTC sentinel run — catches upstream drift even when no
    # commits land on the residual branch.
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: contract-tests-residual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  in-fork:
    name: in-fork (residual must satisfy contract)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install residual fork (editable) + pytest
        run: |
          set -euo pipefail
          # Editable install of THIS branch — the vllm package shadowed by
          # our 6 sampler patches. We do NOT need CUDA / compiled kernels
          # for read-only contract inspection.
          VLLM_TARGET_DEVICE=cpu pip install --no-build-isolation -e . || \
            VLLM_TARGET_DEVICE=empty pip install --no-build-isolation -e .
          pip install pytest

      - name: Run contract tests against in-fork wheel
        run: |
          pytest tests/contract -v --tb=short

  upstream-drift:
    name: upstream-drift (alert when upstream signature changes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Purpose of this job: ALERT, not gate. Failure here means upstream
    # has drifted from the surface our patches assume — the rebase author
    # must reconcile BEFORE accepting the next minor.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install latest upstream vllm from PyPI
        run: |
          set -euo pipefail
          # Use the latest stable upstream wheel — NOT our fork. The
          # patch-added fields will be missing; that is the signal.
          pip install --upgrade pip
          pip install vllm
          pip install pytest

      - name: Stage contract tests outside the working tree
        # Copy tests/contract into a tempdir + run pytest from there so we
        # never accidentally pick up THIS repo as the vllm source root.
        run: |
          set -euo pipefail
          STAGE=$(mktemp -d)
          cp -r tests/contract "$STAGE/contract"
          # Drop a no-op conftest so pytest doesn't reach back into the
          # vllm source tree's conftest.
          : > "$STAGE/contract/conftest.py"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Run contract tests against upstream wheel
        # When this step fails: upstream drifted. Inspect the diff against
        # the surface assertions in tests/contract/test_sampler_surface.py
        # and update REBASE.md + the contract file before the next rebase.
        run: |
          set -euo pipefail
          cd "$STAGE"
          pytest contract -v --tb=short

      - name: Drift summary
        if: always()
        run: |
          {
            echo "### upstream-drift sentinel"
            echo ""
            if [ "${{ steps.run.outcome }}" = "failure" ]; then
              echo "**Status:** upstream drifted — manual review needed before next rebase."
            else
              echo "**Status:** upstream still matches the surface our patches assume."
            fi
            echo ""
            echo "See REBASE.md for the next-minor rebase procedure."
          } >> "$GITHUB_STEP_SUMMARY"
